# Example arc config — copy to ~/.claude/state/arcs/<your-slug>.conf
# Format: one absolute path per line.
# Optional `T:` prefix = if file > 100KB, truncate (head 200 + tail 100).
# Lines starting with # are comments. Blank lines ignored.

# Replace these with your project files:
# /absolute/path/to/your/project/README.md
# /absolute/path/to/your/project/docs/architecture.md
# T:/absolute/path/to/your/very/large/file.md
